version: "3.9"

services:
  # =====================================================================
  # SOCKS5 Proxy — the monitored proxy container
  # =====================================================================
  socks5:
    image: serjs/go-socks5-proxy:latest
    container_name: socks5
    restart: unless-stopped
    ports:
      - "1081:1080"
    environment:
      - PROXY_USER=proxyuser
      - PROXY_PASSWORD=proxypass
    networks:
      - proxy-net

  # =====================================================================
  # WireGuard Easy — VPN companion
  # =====================================================================
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - WG_HOST=vps.example.com
      - PASSWORD_HASH=$$2a$$12$$...
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_ALLOWED_IPS=0.0.0.0/0
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    volumes:
      - wg-easy-data:/etc/wireguard
    networks:
      - proxy-net

  # =====================================================================
  # ProxyWatch — SOCKS5 monitoring dashboard
  # =====================================================================
  proxywatch:
    build: .
    container_name: proxywatch
    restart: unless-stopped
    pid: host
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - PROXYWATCH_CONFIG=/app/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys/class/net:/sys/class/net:ro
      - ./config.yaml:/app/config.yaml:ro
      - proxywatch-export:/tmp
    profiles:
      - monitoring

networks:
  proxy-net:
    driver: bridge

volumes:
  wg-easy-data:
  proxywatch-export: